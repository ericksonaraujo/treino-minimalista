<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<title>Treino Minimalista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #111;
  --surface2: #161616;
  --border: #1e1e1e;
  --border2: #2c2c2c;
  --accent: #ff7a1f;
  --accent-dim: rgba(255,122,31,0.08);
  --accent-border: rgba(255,122,31,0.35);
  --rest: #ff4422;
  --rest-dim: rgba(255,68,34,0.08);
  --rest-border: rgba(255,68,34,0.35);
  --done: #2a2a2a;
  --text: #ffffff;
  --text2: #777;
  --text3: #333;
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'Barlow', sans-serif;
  --font-c: 'Barlow Condensed', sans-serif;
  --r: 10px;
  --r-sm: 7px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  min-height: 100vh;
  overscroll-behavior: none;
}

/* SCREENS */
.screen { display: none; flex-direction: column; min-height: 100vh; padding: 24px 20px 32px; max-width: 460px; margin: 0 auto; }
.screen.active { display: flex; }

/* ─── SETUP ─── */
.logo { padding: 16px 0 28px; }
.logo h1 { font-family: var(--font-d); font-size: 52px; letter-spacing: 3px; line-height: .92; }
.logo h1 em { color: var(--accent); font-style: normal; }
.logo p { font-family: var(--font-c); font-size: 11px; color: var(--text3); letter-spacing: .15em; text-transform: uppercase; margin-top: 8px; }

.sec-label {
  font-family: var(--font-c);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text3);
  margin: 0 0 10px;
}

.ex-grid {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 22px;
}
.ex-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  cursor: pointer;
  user-select: none;
  transition: border-color .15s, background .15s;
  position: relative;
  overflow: hidden;
}
.ex-card.on {
  border-color: var(--accent-border);
  background: var(--accent-dim);
}
.ex-card-head {
  display: flex;
  align-items: center;
  gap: 0;
  position: relative;
}
.ex-toggle-btn {
  flex-shrink: 0;
  width: 48px;
  align-self: stretch;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text3);
  transition: color .15s;
  border-right: 1px solid var(--border);
}
.ex-toggle-btn:hover { color: var(--text2); }
.ex-toggle-icon {
  font-size: 18px;
  line-height: 1;
  transition: transform .2s;
  display: block;
}
.ex-card.expanded .ex-toggle-icon { transform: rotate(90deg); }
.ex-card-body {
  flex: 1;
  padding: 12px 0 12px 14px;
  min-width: 0;
}
.ex-card-name { font-family: var(--font-c); font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: .02em; }
.ex-card-muscle { font-size: 11px; color: var(--text2); margin-top: 1px; }
.ex-card-right {
  flex-shrink: 0;
  align-self: stretch;
  display: flex;
  align-items: center;
  padding: 0 14px;
  border-left: 1px solid var(--border);
  cursor: pointer;
}
.ex-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  transition: all .15s;
  flex-shrink: 0;
  position: relative;
}
.ex-card.on .ex-dot {
  background: var(--accent);
  border-color: var(--accent);
}
.ex-card.on .ex-dot::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 6px; height: 6px;
  background: #000;
  border-radius: 50%;
}
.ex-del-btn:hover { color: var(--rest) !important; }

/* Expanded detail panel */
.ex-panel {
  display: none;
  border-top: 1px solid var(--border);
  padding: 14px 14px 14px 14px;
}
.ex-card.expanded .ex-panel { display: block; }

.panel-section-label {
  font-family: var(--font-c);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
}

/* Muscle bars */
.muscle-bars { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.mbar-row { display: flex; align-items: center; gap: 10px; }
.mbar-label { font-family: var(--font-c); font-size: 11px; color: var(--text2); width: 88px; flex-shrink: 0; }
.mbar-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.mbar-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .6s cubic-bezier(.4,0,.2,1); width: 0; }
.mbar-val { font-family: var(--font-c); font-size: 10px; color: var(--text3); width: 28px; text-align: right; flex-shrink: 0; }

/* Progressions */
.prog-steps { display: flex; flex-direction: column; gap: 0; }
.prog-step { display: flex; align-items: flex-start; gap: 10px; padding: 5px 0; position: relative; }
.prog-step:not(:last-child)::after {
  content: '';
  position: absolute;
  left: 5px; top: 18px;
  width: 1px; height: calc(100% - 4px);
  background: var(--border2);
}
.prog-dot-wrap { flex-shrink: 0; width: 11px; display: flex; justify-content: center; padding-top: 3px; }
.prog-dot-s {
  width: 11px; height: 11px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
  flex-shrink: 0;
}
.prog-dot-s.current { background: var(--accent); border-color: var(--accent); }
.prog-content { flex: 1; }
.prog-step-lvl { font-family: var(--font-c); font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
.prog-step-desc { font-family: var(--font-b); font-size: 12px; color: var(--text2); line-height: 1.4; margin-top: 1px; }
.prog-step.current .prog-step-lvl { color: var(--accent); }
.prog-step.current .prog-step-desc { color: var(--text); }

.custom-box {
  display: flex;
  flex-direction: column;
  gap: 7px;
  margin-bottom: 22px;
}
.custom-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 13px;
  padding: 10px 13px;
  outline: none;
  transition: border-color .15s;
}
.custom-input::placeholder { color: var(--text3); }
.custom-input:focus { border-color: var(--border2); }
.custom-add {
  width: 100%;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: var(--r-sm);
  color: var(--text2);
  font-family: var(--font-c);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .12em;
  padding: 10px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.custom-add:hover { border-color: var(--accent-border); color: var(--accent); }
.custom-add:active { opacity: .7; }

.cfg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

.btn-group { display: flex; gap: 5px; }
.btn-opt {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text2);
  font-family: var(--font-c);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 4px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  user-select: none;
}
.btn-opt:hover { border-color: var(--border2); }
.btn-opt.on { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }

.btn-start {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: var(--r);
  color: #000;
  font-family: var(--font-d);
  font-size: 22px;
  letter-spacing: 2px;
  padding: 20px;
  cursor: pointer;
  transition: all .12s;
  margin-top: auto;
}
.btn-start:hover { background: #ff9140; }
.btn-start:active { transform: scale(.98); }
.btn-start:disabled { opacity: .25; cursor: not-allowed; transform: none; }

/* ─── WORKOUT ─── */
.wk-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0 18px;
}
.wk-set {
  font-family: var(--font-c);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--text2);
}
.btn-quit {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text3);
  font-family: var(--font-c);
  font-size: 11px;
  letter-spacing: .08em;
  padding: 6px 12px;
  cursor: pointer;
  transition: all .15s;
  text-transform: uppercase;
}
.btn-quit:hover { border-color: var(--border2); color: var(--text2); }

/* ── QUIT MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 28px 24px 20px;
  width: calc(100% - 48px);
  max-width: 320px;
  text-align: center;
}
.modal-title {
  font-family: var(--font-d);
  font-size: 26px;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 8px;
}
.modal-sub {
  font-family: var(--font-c);
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 22px;
  letter-spacing: .04em;
}
.modal-btns { display: flex; gap: 8px; }
.modal-btn {
  flex: 1;
  padding: 14px;
  border-radius: var(--r-sm);
  font-family: var(--font-d);
  font-size: 16px;
  letter-spacing: 1.5px;
  cursor: pointer;
  transition: all .12s;
  border: none;
}
.modal-btn.cancel { background: var(--border); color: var(--text2); }
.modal-btn.cancel:hover { background: var(--border2); }
.modal-btn.confirm { background: var(--rest); color: #fff; }
.modal-btn.confirm:hover { background: #ff5533; }

/* ── DRAG ── */
.ex-card.dragging {
  opacity: .3;
  border-style: dashed;
}
.ex-card:hover .ex-toggle-btn { color: var(--text2); }

/* Progress panel */
.prog-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 20px;
}
.prog-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0;
  opacity: .35;
  transition: opacity .25s;
}
.prog-row.cur { opacity: 1; }
.prog-name {
  font-family: var(--font-c);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: .02em;
}
.prog-dots { display: flex; gap: 5px; flex-shrink: 0; }
.pdot {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
  transition: all .3s;
}
.pdot.done { background: var(--border2); border-color: var(--border2); }
.pdot.cur-ex { background: var(--accent); border-color: var(--accent); }
.pdot.cur-rest { background: var(--rest); border-color: var(--rest); }

/* Overall progress bar */
.overall-bar {
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}
.overall-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
  width: 0%;
}

/* Main workout area */
.wk-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 10px 0;
}
.phase-tag {
  font-family: var(--font-c);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
  margin-bottom: 14px;
  transition: all .3s;
}
.phase-tag.ex { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border); }
.phase-tag.rest { background: var(--rest-dim); color: var(--rest); border: 1px solid var(--rest-border); }

.ex-name {
  font-family: var(--font-d);
  font-size: 44px;
  letter-spacing: 2px;
  line-height: 1.05;
  margin-bottom: 5px;
  transition: opacity .25s;
}
.ex-muscle-tag {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 28px;
  font-family: var(--font-c);
  letter-spacing: .04em;
}

.timer {
  font-family: var(--font-d);
  font-size: 100px;
  letter-spacing: 4px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  min-width: 240px;
  text-align: center;
  transition: color .3s;
}
.timer.ex-mode { color: var(--text); }
.timer.rest-mode { color: var(--rest); }
.timer.warn {
  color: var(--accent);
  animation: pulse .6s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: .5; }
}

.next-up {
  margin-top: 18px;
  font-family: var(--font-c);
  font-size: 12px;
  color: var(--text3);
  letter-spacing: .06em;
  text-transform: uppercase;
  min-height: 18px;
}
.next-up b { color: var(--text2); font-weight: 500; }

/* Action button */
.wk-footer { padding: 20px 0 0; }
.btn-action {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: var(--r);
  color: #000;
  font-family: var(--font-d);
  font-size: 22px;
  letter-spacing: 2px;
  padding: 20px;
  cursor: pointer;
  transition: all .12s;
}
.btn-action:hover { background: #ff9140; }
.btn-action:active { transform: scale(.98); }
.btn-action.skip {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  letter-spacing: 1px;
}
.btn-action.skip:hover { border-color: var(--rest); color: var(--rest); background: transparent; }

/* ─── COMPLETE ─── */
.done-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px 0;
}
.done-mark {
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.done-title {
  font-family: var(--font-d);
  font-size: 56px;
  letter-spacing: 3px;
  line-height: 1;
  margin-bottom: 8px;
}
.done-sub {
  font-family: var(--font-c);
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 40px;
  letter-spacing: .04em;
}

.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  width: 100%;
  margin-bottom: 40px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 16px 10px;
}
.stat-val { font-family: var(--font-d); font-size: 34px; color: var(--accent); letter-spacing: 1px; }
.stat-lbl { font-family: var(--font-c); font-size: 10px; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-top: 3px; }

.btn-restart {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: var(--r);
  color: #000;
  font-family: var(--font-d);
  font-size: 22px;
  letter-spacing: 2px;
  padding: 20px;
  cursor: pointer;
  transition: all .12s;
}
.btn-restart:hover { background: #ff9140; }
.btn-restart:active { transform: scale(.98); }
</style>
</head>
<body>

<!-- ═══════════════ SETUP ═══════════════ -->
<div id="s-setup" class="screen active">
  <div class="logo">
    <h1>TREINO<br><em>MINIMALISTA</em></h1>
  </div>

  <p class="sec-label">Exercícios</p>
  <div class="ex-grid" id="ex-grid"></div>

  <div class="custom-box">
    <input id="custom-name" class="custom-input" type="text" placeholder="Nome do exercício..." maxlength="30" autocomplete="off"/>
    <button class="custom-add" id="custom-add" onclick="addCustom()">+ ADICIONAR</button>
  </div>

  <div class="cfg-row">
    <div>
      <p class="sec-label">Séries</p>
      <div class="btn-group" id="grp-sets">
        <div class="btn-opt" data-v="2">2</div>
        <div class="btn-opt on" data-v="3">3</div>
        <div class="btn-opt" data-v="4">4</div>
        <div class="btn-opt" data-v="5">5</div>
      </div>
    </div>
    <div>
      <p class="sec-label">Descanso</p>
      <div class="btn-group" id="grp-rest">
        <div class="btn-opt" data-v="30">30s</div>
        <div class="btn-opt on" data-v="60">60s</div>
        <div class="btn-opt" data-v="90">90s</div>
        <div class="btn-opt" data-v="120">2m</div>
      </div>
    </div>
  </div>

  <button class="btn-start" id="btn-start" onclick="startWorkout()">INICIAR TREINO →</button>
</div>

<!-- ═══════════════ WORKOUT ═══════════════ -->
<div id="s-workout" class="screen">
  <div class="wk-header">
    <span class="wk-set" id="lbl-set">Série 1 de 3</span>
    <button class="btn-quit" onclick="quitWorkout()">encerrar</button>
  </div>

  <div class="overall-bar"><div class="overall-fill" id="overall-fill"></div></div>
  <div class="prog-panel" id="prog-panel"></div>

  <div class="wk-main">
    <div class="phase-tag ex" id="phase-tag">EXERCÍCIO</div>
    <div class="ex-name" id="ex-name">Pull-up</div>
    <div class="ex-muscle-tag" id="ex-muscle">Dorsal · Bíceps</div>
    <div class="timer ex-mode" id="timer">00:00</div>
    <div class="next-up" id="next-up"></div>
  </div>

  <div class="wk-footer">
    <button class="btn-action" id="btn-action" onclick="handleAction()">CONCLUIR SÉRIE →</button>
  </div>
</div>

<!-- ═══════════════ COMPLETE ═══════════════ -->
<div id="s-complete" class="screen">
  <div class="done-screen">
    <div class="done-mark">
      <img src="icon.png" width="80" height="80" style="border-radius:20px;"/>
    </div>
    <div class="done-title">TREINO<br>CONCLUÍDO</div>
    <div class="done-sub" id="done-sub"></div>
    <div class="stats-row" id="stats-row"></div>
    <button class="btn-restart" onclick="goSetup()">NOVO TREINO →</button>
  </div>
</div>

<script>
const EX_LIST = [
  {
    id:'pullup', name:'Barra', muscle:'Dorsal · Bíceps', on:true,
    muscles:[{n:'Dorsal',v:92},{n:'Bíceps',v:75},{n:'Romboides',v:62}],
    progressions:[
      {lvl:'Iniciante',     desc:'Remada australiana'},
      {lvl:'Intermediário', desc:'Barra com elástico'},
      {lvl:'Avançado',      desc:'Barra completa'},
      {lvl:'Elite',         desc:'Archer pull-up'},
    ]
  },
  {
    id:'pushup', name:'Flexão', muscle:'Peitoral · Tríceps', on:true,
    muscles:[{n:'Peitoral',v:88},{n:'Tríceps',v:72},{n:'Deltoide Ant.',v:58}],
    progressions:[
      {lvl:'Iniciante',     desc:'Flexão inclinada'},
      {lvl:'Intermediário', desc:'Flexão padrão'},
      {lvl:'Avançado',      desc:'Flexão com pés elevados'},
      {lvl:'Elite',         desc:'Archer push-up'},
    ]
  },
  {
    id:'squat', name:'Agachamento', muscle:'Quadríceps · Glúteos', on:true,
    muscles:[{n:'Quadríceps',v:90},{n:'Glúteos',v:72},{n:'Isquiotibiais',v:50}],
    progressions:[
      {lvl:'Iniciante',     desc:'Agachamento assistido'},
      {lvl:'Intermediário', desc:'Agachamento livre'},
      {lvl:'Avançado',      desc:'Bulgarian split squat'},
      {lvl:'Elite',         desc:'Pistol squat'},
    ]
  },
  {
    id:'hinge', name:'Hinge', muscle:'Glúteos · Isquiotibiais', on:true,

// ── AUDIO ──
let actx = null;
function getActx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function beep(f=880, d=0.1, v=0.35, t='sine') {
  try {
    const c = getActx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = t; o.frequency.value = f;
    g.gain.setValueAtTime(v, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
    o.start(c.currentTime); o.stop(c.currentTime + d);
  } catch(e) {}
}
function beepTick()  { beep(700, 0.08, 0.25, 'square'); }
function beepReady() {
  beep(660, 0.12, 0.4, 'sine');
  setTimeout(()=>beep(880,  0.12, 0.4, 'sine'), 160);
  setTimeout(()=>beep(1100, 0.22, 0.5, 'sine'), 320);
}
function beepDone() {
  beep(880,  0.15, 0.5, 'sine');
  setTimeout(()=>beep(1100, 0.15, 0.5, 'sine'), 200);
  setTimeout(()=>beep(1320, 0.3,  0.6, 'sine'), 400);
  setTimeout(()=>beepDone2(), 900);
}
function beepDone2() {
  beep(880, 0.15, 0.4, 'sine');

function renderExGrid() {
  const g = document.getElementById('ex-grid');

    d.className = 'ex-card' + (selIds.includes(ex.id) ? ' on' : '');
    d.draggable = true;
    d.dataset.id = ex.id;

    // Build expanded panel HTML
    let panelHTML = '';
    if (ex.muscles && ex.muscles.length) {
      panelHTML += `<div class="panel-section-label">Ativação Muscular</div>
        <div class="muscle-bars">
          ${ex.muscles.map(m => `
            <div class="mbar-row">

              <div class="mbar-val">${m.v}%</div>
            </div>`).join('')}
        </div>`;
    }
    if (ex.progressions && ex.progressions.length) {
      panelHTML += `<div class="panel-section-label">Progressões</div>
        <div class="prog-steps">
          ${ex.progressions.map(p => `
            <div class="prog-step">
              <div class="prog-dot-wrap"><div class="prog-dot-s"></div></div>
              <div class="prog-content">
                <div class="prog-step-lvl">${p.lvl}</div>
                <div class="prog-step-desc">${p.desc}</div>
              </div>
            </div>`).join('')}
        </div>`;
    }

    d.innerHTML = `
      <div class="ex-card-head">
        ${ex.custom
          ? `<div class="ex-toggle-btn ex-del-btn"><span style="font-size:12px;line-height:1">✕</span></div>`
          : `<div class="ex-toggle-btn"><span class="ex-toggle-icon">›</span></div>`
        }
        <div class="ex-card-body">
          <div class="ex-card-name">${ex.name}</div>
          <div class="ex-card-muscle">${ex.muscle || 'Personalizado'}</div>
        </div>
        <div class="ex-card-right"><div class="ex-dot"></div></div>
      </div>
      ${panelHTML ? `<div class="ex-panel">${panelHTML}</div>` : ''}`;

    // Toggle select — right column
    d.querySelector('.ex-card-right').addEventListener('click', (e) => {
      e.stopPropagation();
      if (selIds.includes(ex.id)) {
        if (selIds.length <= 1) return;
        selIds = selIds.filter(i => i !== ex.id);
        d.classList.remove('on');
      } else {
        selIds.push(ex.id);
        d.classList.add('on');
      }
      document.getElementById('btn-start').disabled = selIds.length === 0;
    });

    // Left button: expand for regular, delete for custom
    const leftBtn = d.querySelector('.ex-toggle-btn');
    if (leftBtn) {
      if (ex.custom) {
        leftBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          EX_LIST.splice(EX_LIST.indexOf(ex), 1);
          selIds = selIds.filter(i => i !== ex.id);
          renderExGrid();
        });
      } else {
        leftBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const wasExpanded = d.classList.contains('expanded');
          d.classList.toggle('expanded');
          if (!wasExpanded) {
            setTimeout(() => {
              d.querySelectorAll('.mbar-fill').forEach(bar => {

  g.querySelectorAll('.ex-card').forEach(card => {

      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.id);

// ── DRAG & DROP (init once) ──
function initDrag() {
  const g = document.getElementById('ex-grid');

  const insertLine = document.createElement('div');
  insertLine.style.cssText = 'height:2px;background:var(--accent);border-radius:2px;margin:2px 4px;display:none;';

  function getInsertIndex(clientY) {
    const cards = [...g.querySelectorAll('.ex-card:not(.dragging)')];
    for (let i = 0; i < cards.length; i++) {
      const r = cards[i].getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return i;
    }
    return cards.length;
  }

  function showLine(idx) {
    const cards = [...g.querySelectorAll('.ex-card:not(.dragging)')];
    insertLine.remove();
    if (idx === 0) g.insertBefore(insertLine, g.firstChild);
    else if (idx >= cards.length) g.appendChild(insertLine);
    else g.insertBefore(insertLine, cards[idx]);
    insertLine.style.display = 'block';
  }

  function hideLine() {
    insertLine.style.display = 'none';
    insertLine.remove();
  }

  function doInsert(fromId, idx) {
    const cards = [...g.querySelectorAll('.ex-card:not(.dragging)')];
    const toId = idx < cards.length ? cards[idx].dataset.id : null;
    const fi = EX_LIST.findIndex(x => x.id === fromId);
    if (fi < 0) return;
    const [moved] = EX_LIST.splice(fi, 1);
    if (toId) { const ti = EX_LIST.findIndex(x => x.id === toId); EX_LIST.splice(ti, 0, moved); }
    else EX_LIST.push(moved);
    renderExGrid();
  }

  // Desktop
  g.addEventListener('dragover', (e) => { e.preventDefault(); showLine(getInsertIndex(e.clientY)); });
  g.addEventListener('dragleave', (e) => { if (!g.contains(e.relatedTarget)) hideLine(); });
  g.addEventListener('drop', (e) => {
    e.preventDefault();
    const fromId = e.dataTransfer.getData('text/plain');
    const idx = getInsertIndex(e.clientY);
    hideLine();
    if (fromId) doInsert(fromId, idx);
  });

  // Touch (long-press)
  let tTimer = null, tId = null, tGhost = null, tIdx = -1;
  g.addEventListener('touchstart', (e) => {
    const card = e.target.closest('.ex-card');
    if (!card) return;
    tTimer = setTimeout(() => {
      tId = card.dataset.id;
      tGhost = card.cloneNode(true);
      tGhost.style.cssText = `position:fixed;opacity:.55;pointer-events:none;width:${card.offsetWidth}px;z-index:999;border-radius:var(--r-sm);background:var(--surface);border:1px dashed var(--accent-border);`;
      document.body.appendChild(tGhost);
      card.classList.add('dragging');
      if (navigator.vibrate) navigator.vibrate(40);
    }, 400);
  }, { passive: true });

  g.addEventListener('touchmove', (e) => {
    if (!tId) { clearTimeout(tTimer); return; }
    e.preventDefault();
    const t = e.touches[0];
    const card = g.querySelector(`.ex-card[data-id="${tId}"]`);
    if (tGhost && card) { tGhost.style.left = (t.clientX - card.offsetWidth/2)+'px'; tGhost.style.top = (t.clientY - 30)+'px'; }
    tIdx = getInsertIndex(t.clientY);
    showLine(tIdx);
  }, { passive: false });

  g.addEventListener('touchend', (e) => {
    clearTimeout(tTimer);
    if (!tId) return;
    if (tGhost) { tGhost.remove(); tGhost = null; }
    const card = g.querySelector(`.ex-card[data-id="${tId}"]`);
    if (card) card.classList.remove('dragging');
    hideLine();
    if (tIdx >= 0) doInsert(tId, tIdx);
    tId = null; tIdx = -1;
  });
}

// ── WORKOUT ──
function startWorkout() {
  activeEx = EX_LIST.filter(e => selIds.includes(e.id));
  setIdx = 0; exIdx = 0;
  phase = 'exercise';
  swSecs = 0; totalDone = 0;
  wkStart = Date.now();
  show('s-workout');
  buildProgress();
  refreshUI();
  startSW();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// stopwatch
function startSW() {
  clear();
  swSecs = 0;
  renderTimer();
  swTimer = setInterval(() => { swSecs++; renderTimer(); }, 1000);
}

// rest countdown
function startRest() {
  clear();
  restLeft = restSecs;
  renderTimer();
  restTimer = setInterval(() => {
    restLeft--;
    renderTimer();
    if (restLeft <= 10 && restLeft > 0) beepTick();
    if (restLeft <= 0) { clear(); beepReady(); setTimeout(advance, 400); }
  }, 1000);
}

function clear() {
  clearInterval(swTimer); clearInterval(restTimer);
  swTimer = null; restTimer = null;
}

// ── PROGRESS ──
function buildProgress() {
  const p = document.getElementById('prog-panel');
  p.innerHTML = '';
  activeEx.forEach((ex, i) => {
    const row = document.createElement('div');
    row.id = `pr${i}`;
    row.className = 'prog-row' + (i===0?' cur':'');
    const nm = document.createElement('div');
    nm.className = 'prog-name';
    nm.textContent = ex.name;
    const dots = document.createElement('div');
    dots.className = 'prog-dots';
    for (let s=0; s<totalSets; s++) {
      const d = document.createElement('div');
      d.id = `pd${i}-${s}`;
      d.className = 'pdot';
      dots.appendChild(d);
    }
    row.appendChild(nm); row.appendChild(dots);
    p.appendChild(row);
  });
  refreshDots();
}

function refreshDots() {
  activeEx.forEach((_,i) => {
    const row = document.getElementById(`pr${i}`);
    if (row) row.className = 'prog-row' + (i===exIdx?' cur':'');
    for (let s=0; s<totalSets; s++) {
      const d = document.getElementById(`pd${i}-${s}`);
      if (!d) continue;
      const done = (s < setIdx) || (s===setIdx && i < exIdx);
      const isCur = (i===exIdx && s===setIdx);
      d.className = 'pdot' + (done?' done': isCur?(phase==='rest'?' cur-rest':' cur-ex'):'');
    }
  });
  // overall bar
  const total = activeEx.length * totalSets;
  const done  = setIdx * activeEx.length + exIdx + (phase==='rest'?1:0);
  document.getElementById('overall-fill').style.width = Math.round(done/total*100)+'%';
}

// ── UI ──
function refreshUI() {
  const ex = activeEx[exIdx];
  const tag  = document.getElementById('phase-tag');
  const name = document.getElementById('ex-name');
  const musc = document.getElementById('ex-muscle');
  const btn  = document.getElementById('btn-action');
  const nxt  = document.getElementById('next-up');
  document.getElementById('lbl-set').textContent = `Série ${setIdx+1} de ${totalSets}`;

  if (phase === 'exercise') {
    const isLastEx  = (exIdx === activeEx.length - 1);
    const isLastSet = (setIdx === totalSets - 1);
    tag.textContent = `EXERCÍCIO ${exIdx+1} DE ${activeEx.length}`;
    tag.className = 'phase-tag ex';
    name.textContent = ex.name;
    musc.textContent = ex.muscle;
    btn.className = 'btn-action';
    if (isLastEx && isLastSet) {
      btn.textContent = 'FINALIZAR TREINO →';
    } else if (isLastEx) {
      btn.textContent = 'CONCLUIR SÉRIE →';
    } else {
      btn.textContent = 'PRÓXIMO EXERCÍCIO →';
    }
    const nx = nextEx();
    nxt.innerHTML = nx ? `A SEGUIR: <b>${nx.name}</b>` : '';
  } else {
    tag.textContent = 'DESCANSANDO';
    tag.className = 'phase-tag rest';
    const nx = nextEx();
    name.textContent  = 'Descanso';
    musc.textContent  = '';
    nxt.innerHTML     = nx ? `PRÓXIMA SÉRIE: <b>${nx.name}</b>` : '';
    btn.textContent   = 'PULAR DESCANSO';
    btn.className     = 'btn-action skip';
  }
  renderTimer();
}

function renderTimer() {
  const el = document.getElementById('timer');
  if (phase === 'exercise') {
    el.textContent = fmt(swSecs);
    el.className = 'timer ex-mode';
  } else {
    el.textContent = fmt(restLeft);
    el.className = 'timer' + (restLeft <= 10 ? ' warn' : ' rest-mode');
  }
}

function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function nextEx() {
  let ni = exIdx + 1, ns = setIdx;
  if (ni >= activeEx.length) { ni = 0; ns++; }
  if (ns >= totalSets) return null;
  return activeEx[ni];
}

// ── ACTIONS ──
function handleAction() {
  if (phase === 'exercise') {
    totalDone++;
    const isLastEx  = (exIdx === activeEx.length - 1);
    const isLastSet = (setIdx === totalSets - 1);
    if (isLastEx && isLastSet) {
      completeWorkout();
    } else if (isLastEx) {
      // End of set → rest, then start next set
      phase = 'rest';
      clear();
      refreshUI();
      refreshDots();
      startRest();
    } else {
      // Mid-set → next exercise immediately, no rest
      advance();
    }
  } else {
    // Skip rest
    clear();
    advance();
  }
}

function advance() {
  exIdx++;
  if (exIdx >= activeEx.length) { exIdx = 0; setIdx++; }
  if (setIdx >= totalSets) { completeWorkout(); return; }
  phase = 'exercise';
  refreshUI();
  refreshDots();
  startSW();
}

function completeWorkout() {
  clear();
  const elapsed = Math.round((Date.now() - wkStart) / 1000);
  const m = Math.floor(elapsed/60), s = elapsed%60;
  const timeStr = m>0 ? `${m}m ${s}s` : `${s}s`;
  show('s-complete');
  document.getElementById('done-sub').textContent =
    `${activeEx.length} exercícios · ${totalSets} séries · ${timeStr}`;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-val">${activeEx.length*totalSets}</div><div class="stat-lbl">Séries</div></div>
    <div class="stat"><div class="stat-val">${activeEx.length}</div><div class="stat-lbl">Exercícios</div></div>
    <div class="stat"><div class="stat-val">${timeStr}</div><div class="stat-lbl">Duração</div></div>`;
  beepDone();
}

function quitWorkout() {
  document.getElementById('quit-modal').classList.add('show');
}
function closeModal() {
  document.getElementById('quit-modal').classList.remove('show');
}
function confirmQuit() {
  closeModal();
  clear();
  goSetup();
}

function goSetup() {
  show('s-setup');
}

function buildIconAsync(size) {
  return new Promise(resolve => {
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
      <defs>
        <linearGradient id="fig" x1="42%" y1="8%" x2="58%" y2="92%">
          <stop offset="0%" stop-color="#ffb347"/>
          <stop offset="100%" stop-color="#c84400"/>
        </linearGradient>
      </defs>
      <rect width="1000" height="1000" fill="#080808"/>
      <!-- Head -->
      <circle cx="405" cy="252" r="90" fill="url(#fig)"/>
      <!-- Body: single unified path — arm up-right, torso, leg down-left -->
      <path fill="url(#fig)" d="
        M 438,368
        L 690,168
        L 728,196
        L 608,415
        L 748,415
        L 748,558
        L 532,558
        L 392,802
        L 278,802
        L 278,558
        L 438,558
        Z
      "/>
    </svg>`;
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      c.getContext('2d').drawImage(img, 0, 0, size, size);
      URL.revokeObjectURL(img.src);
      resolve(c.toDataURL('image/png'));
    };
    img.src = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
  });
}
